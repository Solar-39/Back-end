<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <script>
        function pesquisarCep(){
            const cep = document.getElementById ("cep").value
            const link = "https://viacep.com.br/ws/" + cep + "/json/?callback=preencherEndereco"
            var script = document.createElement("script")
            script.src = link
            document.body.appendChild(script)
        }

        function preencherEndereco(conteudo){
            document.getElementById("rua").value = conteudo.logradouro
            document.getElementById("bairro").value = conteudo.bairro
            document.getElementById("cidade").value = conteudo.localidade
            document.getElementById("estado").value = conteudo.estado
            document.getElementById("número").value = conteudo.numero
        }
    </script>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Borel&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="decoration decoration-3"></div>
    <div class="decoration decoration-4"></div>
    <div class="decoration decoration-5"></div>

</head>
<body>
    <h1>₊✩‧₊˚౨Cadastro de Clientesৎ˚₊✩‧₊</h1>
    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome aqui!" required class="input-texto">

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="email@email.com" required class="input-texto">

        <label for="celular">Celular:</label>
        <input type="tel" id="celular" placeholder="(42) 99999-9999" required class="input-texto">

        <label for="cpf">Cpf:</label>
        <input type="text" id="cpf" placeholder="111.222.333-44" required class="input-texto">

        <label for="cep">Cep:</label>
        <input type="text" id="cep" onblur="pesquisarCep()" name="cep" placeholder="75014000" required class="input-texto">

        <label for="rua">Rua:</label>
        <input type="text" id="rua" placeholder="Rua de la Santé" required class="input-texto">

        <label for="Numero">Número:</label>
        <input type="text" id="Numero" placeholder="42" required class="input-texto">

        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" placeholder="Montparnasse" required class="input-texto">

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" required class="input-texto" placeholder="Paris">
        
        <label for="estado">Estado:</label>
        <input type="text" id="estado" required class="input-texto">

        <input type="submit" value="Enviar Cadastro.✦ ݁˖" class="btn_enviar">
    </form>
</body>
</html>
